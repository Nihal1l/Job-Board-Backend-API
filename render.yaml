services:
  - type: web
    name: job-board-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "daphne job_board.asgi:application --port $PORT --bind 0.0.0.0"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: job-board-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: FRONTEND_URL
        value: "http://localhost:5173"  # Replace with actual frontend URL
      - key: DEBUG
        value: "False"

  - type: psql
    name: job-board-db
    plan: free
    databaseName: job_board
    user: db_user
